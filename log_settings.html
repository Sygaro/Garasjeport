{% extends 'base.html' %}
{% block content %}
<h2>⚙️ Logginnstillinger</h2>

<form method="POST" class="card p-4 shadow-sm">
  <div class="mb-3">
    <label for="log_level" class="form-label">Loggnivå</label>
    <select name="log_level" id="log_level" class="form-select">
      {% for lvl in ["DEBUG", "INFO", "WARNING", "ERROR"] %}
      <option value="{{ lvl }}" {% if lvl == level %}selected{% endif %}>{{ lvl }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label for="rotate_days" class="form-label">Antall dager før logg slettes</label>
    <input type="number" name="rotate_days" id="rotate_days" min="1" max="30" class="form-control"
           value="{{ days }}">
  </div>

  <button class="btn btn-primary">💾 Lagre innstillinger</button>
</form>

<a href="/admin" class="btn btn-secondary btn-sm mt-3">🔙 Tilbake til admin</a>
{% endblock %}
