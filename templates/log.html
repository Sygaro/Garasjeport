
{% extends "base.html" %}
{% block content %}
<h2>📋 Garasjeport-logg</h2>

{% if lines %}
<pre class="small bg-dark text-light p-3 rounded" style="max-height: 500px; overflow-y: scroll;">
{% for line in lines %}{{ line }}{% endfor %}
</pre>
{% else %}
<p>Ingen loggdata tilgjengelig.</p>
{% endif %}

<a href="/logs" class="btn btn-secondary btn-sm mt-3">🔄 Last på nytt</a>
{% endblock %}
