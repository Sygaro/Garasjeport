{% extends 'base.html' %}
{% block content %}
<h2>💾 Backupfiler</h2>
<table class="table table-sm table-bordered">
  <thead class="table-light">
    <tr><th>Filnavn</th><th>Handlinger</th></tr>
  </thead>
  <tbody>
    {% for f in backups %}
    <tr>
      <td>{{ f }}</td>
      <td>
        <a class="btn btn-sm btn-info" href="/admin/backup/view/{{ f }}">🧾 Vis</a>
        <a class="btn btn-sm btn-success" href="/backups/{{ f }}" download>⬇️ Last ned</a>
        <a class="btn btn-sm btn-warning" href="/restore/{{ f }}" onclick="return confirm('Er du sikker på at du vil gjenopprette denne backupen?')">♻️ Gjenopprett</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
