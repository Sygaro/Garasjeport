
{% set current_path = request.path %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Garasjeport</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if current_path == '/' %}active{% endif %}" href="/">Status</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle {% if '/admin' in current_path %}active{% endif %}" href="#" id="adminMenu" role="button" data-bs-toggle="dropdown">Admin</a>

            <li><a class="dropdown-item" href="/admin/settings">Systeminnstillinger</a></li>

            <li><a class="dropdown-item" href="/admin/backup">Backup</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/logs' in current_path %}active{% endif %}" href="/logs">Logger</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/stats' in current_path %}active{% endif %}" href="/stats">Statistikk</a>

      </ul>
      {% if session.get("logged_in") %}
        <a class="btn btn-outline-light btn-sm" href="/logout">Logg ut</a>
      {% endif %}
